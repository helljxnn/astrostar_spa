name: Deploy to Firebase

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.15.0"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: https://astrostar-back-app-acagfwh9evg5cbb0.canadacentral-01.azurewebsites.net/api

      - name: Deploy to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          # Must be a Firebase service account JSON secret (not firebase login:ci token).
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_FUNDACIONMANUELAVANEGAS_47C9B || secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: fundacionmanuelavanegas-47c9b
