server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https://*.azurewebsites.net https://res.cloudinary.com; frame-src 'self' https://youtube.com https://www.youtube.com https://instagram.com https://www.instagram.com https://google.com https://www.google.com; upgrade-insecure-requests" always;
  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location /health {
    access_log off;
    default_type text/plain;
    return 200 "ok";
  }
}
