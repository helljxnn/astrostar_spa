server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; script-src 'self'; style-src 'self'; style-src-elem 'self'; style-src-attr 'unsafe-inline'; img-src 'self' https://res.cloudinary.com https://drive.google.com https://drive.usercontent.google.com https://lh3.googleusercontent.com https://picsum.photos https://i.ytimg.com https://astrostar-back-app-acagfwh9evg5cbb0.canadacentral-01.azurewebsites.net; font-src 'self' data:; connect-src 'self' https://astrostar-back-app-acagfwh9evg5cbb0.canadacentral-01.azurewebsites.net https://res.cloudinary.com; frame-src 'self' https://youtube.com https://www.youtube.com https://instagram.com https://www.instagram.com https://google.com https://www.google.com; upgrade-insecure-requests" always;
  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location /health {
    access_log off;
    default_type text/plain;
    return 200 "ok";
  }
}
